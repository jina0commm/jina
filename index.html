<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Climate Energy Field</title>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let temp = 1.1
let time = 0

// simple particle system (CO2 atmosphere)
const particles = []

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.3,
vy:(Math.random()-0.5)*0.3,
size:Math.random()*3+1
})
}

// temperature → color palette
function climateColors(t){

if(t < 0.5) return ["#003cff","#00d4ff"]

if(t < 1) return ["#00ffa2","#f7ff4a"]

if(t < 1.5) return ["#ff9b00","#ff2a00"]

return ["#ff0033","#5c0000"]

}

// simulate temperature fluctuation
function updateTemp(){
temp = 0.8 + Math.sin(time*0.2)*0.6
}

function drawGradient(){

const colors = climateColors(temp)

const grad = ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
200,
canvas.width/2,
canvas.height/2,
canvas.width
)

grad.addColorStop(0,colors[0])
grad.addColorStop(1,colors[1])

ctx.fillStyle = grad
ctx.fillRect(0,0,canvas.width,canvas.height)

}

function drawHeatWaves(){

for(let i=0;i<8;i++){

ctx.beginPath()

for(let x=0;x<canvas.width;x+=20){

let y =
canvas.height/2 +
Math.sin(x*0.01 + time + i)*80 +
i*30

ctx.lineTo(x,y)

}

ctx.strokeStyle="rgba(255,255,255,0.05)"
ctx.lineWidth=2
ctx.stroke()

}

}

function drawParticles(){

particles.forEach(p=>{

p.x += p.vx
p.y += p.vy

if(p.x<0) p.x=canvas.width
if(p.x>canvas.width) p.x=0
if(p.y<0) p.y=canvas.height
if(p.y>canvas.height) p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.25)"
ctx.fill()

})

}

function animate(){

time += 0.01

updateTemp()

drawGradient()
drawHeatWaves()
drawParticles()

requestAnimationFrame(animate)

}

animate()

window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight

})

</script>

</body>
</html>

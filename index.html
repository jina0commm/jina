<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Liquid Climate Flow</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
filter:blur(20px) contrast(120%);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let time = 0
let co2 = 420

let mouse = {
x:canvas.width/2,
y:canvas.height/2,
active:false
}

// fetch climate data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// fluid points
let points = []

for(let i=0;i<25;i++){

points.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6,
size:200 + Math.random()*200

})

}


// cursor
window.addEventListener("mousemove",(e)=>{

mouse.x = e.clientX
mouse.y = e.clientY
mouse.active = true

})


// climate colors
function getColors(){

let heat = co2/500

let r = Math.floor(255*heat)
let b = Math.floor(255*(1-heat))

return {

warm:`rgba(${r},80,40,0.9)`,
cool:`rgba(40,120,${b},0.9)`

}

}


// draw fluid blobs
function drawFluid(){

let colors = getColors()

points.forEach(p=>{

p.vx += Math.sin(time + p.y*0.01)*0.05
p.vy += Math.cos(time + p.x*0.01)*0.05

p.x += p.vx
p.y += p.vy


// cursor cooling current
let dx = mouse.x - p.x
let dy = mouse.y - p.y
let dist = Math.sqrt(dx*dx + dy*dy)

if(dist < 250){

let force = (250 - dist)/250

p.x -= dx * force * 0.03
p.y -= dy * force * 0.03

}


// wrap edges
if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0


let grad = ctx.createRadialGradient(

p.x,
p.y,
0,

p.x,
p.y,
p.size

)

grad.addColorStop(0,colors.warm)
grad.addColorStop(1,colors.cool)

ctx.globalCompositeOperation="lighter"

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

ctx.globalCompositeOperation="source-over"

}


// subtle particles
let particles=[]

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.2,
vy:(Math.random()-0.5)*0.2

})

}

function drawParticles(){

particles.forEach(p=>{

p.x += p.vx
p.y += p.vy

if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,1.5,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.2)"
ctx.fill()

})

}


// cursor aura
function drawCursor(){

if(!mouse.active) return

let size = 200 + Math.sin(time*2)*10

let grad = ctx.createRadialGradient(

mouse.x,
mouse.y,
0,

mouse.x,
mouse.y,
size

)

grad.addColorStop(0,"rgba(120,220,255,0.5)")
grad.addColorStop(1,"rgba(0,120,255,0)")

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(mouse.x,mouse.y,size,0,Math.PI*2)
ctx.fill()

}


// animation
function animate(){

time += 0.01

ctx.fillStyle="rgba(0,0,0,0.06)"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawFluid()
drawParticles()
drawCursor()

requestAnimationFrame(animate)

}

animate()


window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight

})

</script>

</body>
</html>

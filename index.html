<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Interaction</title>

<style>
body{
margin:0;
overflow:hidden;
background:#0a0f14;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let co2 = 420

// fetch climate data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// mouse
let mouse = {
x:canvas.width/2,
y:canvas.height/2
}

window.addEventListener("mousemove",(e)=>{

mouse.x = e.clientX
mouse.y = e.clientY

})


// blobs
let blobs = []

for(let i=0;i<10;i++){

blobs.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1,
r:80+Math.random()*40

})

}


// heat color based on CO2
function heatColor(){

let heat = (co2-350)/120
if(heat<0)heat=0
if(heat>1)heat=1

let r = 200 + heat*55
let g = 50 + heat*40

return `rgb(${r},${g},30)`

}


// animation
function animate(){

ctx.fillStyle="rgba(10,15,20,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

blobs.forEach(b=>{

// movement
b.x += b.vx
b.y += b.vy


// cursor repulsion
let dx = b.x - mouse.x
let dy = b.y - mouse.y
let dist = Math.sqrt(dx*dx + dy*dy)

if(dist < 200){

let force = (200-dist)/200

b.vx += dx*force*0.02
b.vy += dy*force*0.02

}


// slow damping
b.vx *= 0.98
b.vy *= 0.98


// wrap screen
if(b.x<0)b.x=canvas.width
if(b.x>canvas.width)b.x=0
if(b.y<0)b.y=canvas.height
if(b.y>canvas.height)b.y=0


// draw blob
ctx.beginPath()
ctx.arc(b.x,b.y,b.r,0,Math.PI*2)

ctx.fillStyle = heatColor()
ctx.fill()

})


// draw cursor indicator
ctx.beginPath()
ctx.arc(mouse.x,mouse.y,200,0,Math.PI*2)
ctx.strokeStyle="rgba(120,200,255,0.4)"
ctx.lineWidth=2
ctx.stroke()

requestAnimationFrame(animate)

}

animate()


window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight

})

</script>

</body>
</html>

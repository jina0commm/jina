<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Liquid Climate Field</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let time = 0
let co2 = 420

let mouse = {
x:canvas.width/2,
y:canvas.height/2,
active:false
}


// fetch climate data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// liquid blobs
let blobs = []

for(let i=0;i<5;i++){

blobs.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.3,
vy:(Math.random()-0.5)*0.3,
size:400 + Math.random()*300

})

}


// cursor interaction
window.addEventListener("mousemove",(e)=>{

mouse.x = e.clientX
mouse.y = e.clientY
mouse.active = true

})


// color palette from climate heat
function getColors(){

let heat = co2/500

let warm = Math.floor(255*heat)
let cool = Math.floor(255*(1-heat))

return {

warm:`rgb(${warm},80,20)`,
cool:`rgb(20,80,${cool})`,
accent:`rgb(120,200,255)`

}

}


// draw liquid gradient blobs
function drawBlobs(){

let colors = getColors()

blobs.forEach(b=>{

// movement
b.x += b.vx + Math.sin(time*0.3 + b.y*0.002)
b.y += b.vy + Math.cos(time*0.3 + b.x*0.002)

// cursor cooling influence
let dx = mouse.x - b.x
let dy = mouse.y - b.y
let dist = Math.sqrt(dx*dx+dy*dy)

if(dist < 300){

let force = (300-dist)/300

b.x -= dx*force*0.02
b.y -= dy*force*0.02

}

// wrap edges
if(b.x<0)b.x=canvas.width
if(b.x>canvas.width)b.x=0
if(b.y<0)b.y=canvas.height
if(b.y>canvas.height)b.y=0


let grad = ctx.createRadialGradient(

b.x,
b.y,
0,

b.x,
b.y,
b.size

)

grad.addColorStop(0,colors.warm)
grad.addColorStop(1,colors.cool)

ctx.globalCompositeOperation = "lighter"

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(b.x,b.y,b.size,0,Math.PI*2)
ctx.fill()

})

ctx.globalCompositeOperation = "source-over"

}


// subtle atmosphere particles
let particles=[]

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.2,
vy:(Math.random()-0.5)*0.2

})

}

function drawParticles(){

particles.forEach(p=>{

p.x += p.vx
p.y += p.vy

if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,1.5,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.25)"
ctx.fill()

})

}


// cooling aura
function drawCursor(){

if(!mouse.active) return

let size = 180 + Math.sin(time*3)*10

let grad = ctx.createRadialGradient(

mouse.x,
mouse.y,
0,

mouse.x,
mouse.y,
size

)

grad.addColorStop(0,"rgba(120,200,255,0.6)")
grad.addColorStop(1,"rgba(0,120,255,0)")

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(mouse.x,mouse.y,size,0,Math.PI*2)
ctx.fill()

}


// animation
function animate(){

time += 0.01

ctx.fillStyle="rgba(0,0,0,0.08)"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawBlobs()
drawParticles()
drawCursor()

requestAnimationFrame(animate)

}

animate()


window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight

})

</script>

</body>
</html>

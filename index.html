<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Disturbance Field</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let co2 = 420
let time = 0

let mouse = {
x:canvas.width/2,
y:canvas.height/2,
active:false
}

// fetch climate data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// particle system
let particles=[]

function createParticles(){

particles=[]

let count = Math.floor(co2/1.8)

for(let i=0;i<count;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1.2,
vy:(Math.random()-0.5)*1.2,
size:Math.random()*3+1

})

}

}

createParticles()


// cursor interaction
window.addEventListener("mousemove",(e)=>{

mouse.x = e.clientX
mouse.y = e.clientY
mouse.active = true

})

window.addEventListener("touchmove",(e)=>{

mouse.x = e.touches[0].clientX
mouse.y = e.touches[0].clientY
mouse.active = true

})


// draw climate background
function drawClimate(){

let heat = co2/500

let r = Math.floor(255*heat)
let g = Math.floor(120*(1-heat))
let b = Math.floor(255*(1-heat))

let grad = ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
200,
canvas.width/2,
canvas.height/2,
canvas.width
)

grad.addColorStop(0,`rgb(${r},${g},0)`)
grad.addColorStop(1,`rgb(0,0,${b})`)

ctx.fillStyle = grad
ctx.fillRect(0,0,canvas.width,canvas.height)

}


// draw cooling ripple
function drawRipple(){

if(!mouse.active) return

let rippleSize = 120 + Math.sin(time*4)*20

let grad = ctx.createRadialGradient(

mouse.x,
mouse.y,
0,

mouse.x,
mouse.y,
rippleSize

)

grad.addColorStop(0,"rgba(120,200,255,0.7)")
grad.addColorStop(1,"rgba(0,0,255,0)")

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(mouse.x,mouse.y,rippleSize,0,Math.PI*2)
ctx.fill()

}


// particles
function updateParticles(){

particles.forEach(p=>{

// turbulence
p.x += p.vx + Math.sin(time+p.y*0.02)*0.5
p.y += p.vy + Math.cos(time+p.x*0.02)*0.5

// cursor interaction
let dx = p.x - mouse.x
let dy = p.y - mouse.y
let dist = Math.sqrt(dx*dx+dy*dy)

if(dist < 150){

let force = (150-dist)/150

p.x += dx*force*2
p.y += dy*force*2

}

// wrap edges
if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.7)"
ctx.fill()

})

}


// animation
function animate(){

time += 0.01

ctx.fillStyle="rgba(0,0,0,0.15)"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawClimate()
updateParticles()
drawRipple()

requestAnimationFrame(animate)

}

animate()

window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight
createParticles()

})

</script>

</body>
</html>

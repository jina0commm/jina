<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Breathing Field</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let time = 0
let co2 = 420

let mouse = {
x:canvas.width/2,
y:canvas.height/2,
active:false
}

// fetch real CO2 data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// particles (atmosphere)
let particles=[]

function createParticles(){

particles=[]

let count = Math.floor(co2/3)

for(let i=0;i<count;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.4,
vy:(Math.random()-0.5)*0.4,
size:Math.random()*2+1

})

}

}

createParticles()


// cursor interaction
window.addEventListener("mousemove",(e)=>{

mouse.x = e.clientX
mouse.y = e.clientY
mouse.active = true

})


// smooth climate gradient
function drawGradient(){

let heat = co2/500

let warm = Math.floor(255*heat)
let cool = Math.floor(255*(1-heat))

let grad = ctx.createRadialGradient(

canvas.width/2 + Math.sin(time*0.3)*200,
canvas.height/2 + Math.cos(time*0.3)*200,
200,

canvas.width/2,
canvas.height/2,
canvas.width

)

grad.addColorStop(0,`rgb(${warm},80,0)`)
grad.addColorStop(1,`rgb(0,0,${cool})`)

ctx.fillStyle = grad
ctx.fillRect(0,0,canvas.width,canvas.height)

}


// particles reacting to cursor
function updateParticles(){

particles.forEach(p=>{

// subtle drift
p.x += p.vx + Math.sin(time+p.y*0.01)*0.2
p.y += p.vy + Math.cos(time+p.x*0.01)*0.2

// cursor cooling force
let dx = mouse.x - p.x
let dy = mouse.y - p.y

let dist = Math.sqrt(dx*dx + dy*dy)

if(dist < 200){

let force = (200 - dist)/200

p.x -= dx * force * 0.05
p.y -= dy * force * 0.05

}

// wrap edges
if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.5)"
ctx.fill()

})

}


// visible cooling aura
function drawCursor(){

if(!mouse.active) return

let radius = 140 + Math.sin(time*3)*10

let grad = ctx.createRadialGradient(

mouse.x,
mouse.y,
0,

mouse.x,
mouse.y,
radius

)

grad.addColorStop(0,"rgba(140,220,255,0.8)")
grad.addColorStop(1,"rgba(0,120,255,0)")

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(mouse.x,mouse.y,radius,0,Math.PI*2)
ctx.fill()

}


// animation
function animate(){

time += 0.01

ctx.fillStyle="rgba(0,0,0,0.1)"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawGradient()
updateParticles()
drawCursor()

requestAnimationFrame(animate)

}

animate()

window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight
createParticles()

})

</script>

</body>
</html>

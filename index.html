<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Liquid Field</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
filter:blur(18px) contrast(120%);
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let time = 0
let co2 = 420

let mouse = {
x:canvas.width/2,
y:canvas.height/2,
active:false
}


// climate data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// fluid points (reduced = calmer motion)
let points=[]

for(let i=0;i<12;i++){

points.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.3,
vy:(Math.random()-0.5)*0.3,
size:300 + Math.random()*200

})

}


// cursor tracking
window.addEventListener("mousemove",(e)=>{

mouse.x = e.clientX
mouse.y = e.clientY
mouse.active = true

})


// climate colour palette
function getColors(){

let heat = co2/500

let red = Math.floor(255*heat)
let blue = Math.floor(200*(1-heat))

return {

hot:`rgba(${red},60,20,0.9)`,
warm:`rgba(255,120,40,0.8)`,
cool:`rgba(30,120,${blue},0.8)`

}

}


// draw fluid
function drawFluid(){

let colors = getColors()

points.forEach(p=>{

// slow drifting motion
p.vx += Math.sin(time*0.2 + p.y*0.005)*0.02
p.vy += Math.cos(time*0.2 + p.x*0.005)*0.02

p.x += p.vx
p.y += p.vy


// cursor cooling influence (stronger + clearer)
let dx = mouse.x - p.x
let dy = mouse.y - p.y

let dist = Math.sqrt(dx*dx + dy*dy)

if(dist < 300){

let force = (300 - dist)/300

p.x -= dx * force * 0.05
p.y -= dy * force * 0.05

}


// wrap edges
if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0


// layered gradients
let grad = ctx.createRadialGradient(

p.x,
p.y,
0,

p.x,
p.y,
p.size

)

grad.addColorStop(0,colors.hot)
grad.addColorStop(0.4,colors.warm)
grad.addColorStop(1,colors.cool)

ctx.globalCompositeOperation="lighter"

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

})

ctx.globalCompositeOperation="source-over"

}


// subtle atmosphere particles
let particles=[]

for(let i=0;i<40;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.1,
vy:(Math.random()-0.5)*0.1

})

}

function drawParticles(){

particles.forEach(p=>{

p.x += p.vx
p.y += p.vy

if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,1.5,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.15)"
ctx.fill()

})

}


// cursor cooling field
function drawCursor(){

if(!mouse.active) return

let size = 220

let grad = ctx.createRadialGradient(

mouse.x,
mouse.y,
0,

mouse.x,
mouse.y,
size

)

grad.addColorStop(0,"rgba(120,220,255,0.7)")
grad.addColorStop(1,"rgba(0,120,255,0)")

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(mouse.x,mouse.y,size,0,Math.PI*2)
ctx.fill()

}


// animation
function animate(){

time += 0.01

ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawFluid()
drawParticles()
drawCursor()

requestAnimationFrame(animate)

}

animate()


window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight

})

</script>

</body>
</html>

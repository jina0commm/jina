<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Storm Field</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let time = 0
let co2 = 420

let mouse = {
x:canvas.width/2,
y:canvas.height/2,
active:false
}

// climate data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// particles = atmosphere
let particles=[]

function createParticles(){

particles=[]

let count = Math.floor(co2*1.2)

for(let i=0;i<count;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,
size:Math.random()*2+1
})

}

}

createParticles()


// cursor tracking
window.addEventListener("mousemove",(e)=>{
mouse.x = e.clientX
mouse.y = e.clientY
mouse.active = true
})

window.addEventListener("touchmove",(e)=>{
mouse.x = e.touches[0].clientX
mouse.y = e.touches[0].clientY
mouse.active = true
})


// background climate heat
function drawClimate(){

let heat = co2/500

let r = Math.floor(255*heat)
let g = Math.floor(120*(1-heat))
let b = Math.floor(255*(1-heat))

let grad = ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
200,
canvas.width/2,
canvas.height/2,
canvas.width
)

grad.addColorStop(0,`rgb(${r},${g},0)`)
grad.addColorStop(1,`rgb(0,0,${b})`)

ctx.fillStyle = grad
ctx.fillRect(0,0,canvas.width,canvas.height)

}


// storm waves
function drawHeatWaves(){

for(let i=0;i<6;i++){

ctx.beginPath()

for(let x=0;x<canvas.width;x+=20){

let y =
canvas.height/2 +
Math.sin(x*0.01 + time*2 + i)*80 +
i*40

ctx.lineTo(x,y)

}

ctx.strokeStyle="rgba(255,255,255,0.05)"
ctx.lineWidth=2
ctx.stroke()

}

}


// particles
function updateParticles(){

particles.forEach(p=>{

let dx = p.x - mouse.x
let dy = p.y - mouse.y

let dist = Math.sqrt(dx*dx+dy*dy)

// vortex interaction
if(dist < 200){

let force = (200-dist)/200

p.vx += dx*force*0.02
p.vy += dy*force*0.02

}

// storm turbulence
p.vx += Math.sin(time + p.y*0.01)*0.05
p.vy += Math.cos(time + p.x*0.01)*0.05

p.x += p.vx
p.y += p.vy

// wrap edges
if(p.x<0)p.x=canvas.width
if(p.x>canvas.width)p.x=0
if(p.y<0)p.y=canvas.height
if(p.y>canvas.height)p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.6)"
ctx.fill()

})

}


// cooling aura
function drawCursor(){

if(!mouse.active) return

let size = 150 + Math.sin(time*4)*30

let grad = ctx.createRadialGradient(

mouse.x,
mouse.y,
0,

mouse.x,
mouse.y,
size

)

grad.addColorStop(0,"rgba(120,220,255,0.9)")
grad.addColorStop(1,"rgba(0,80,255,0)")

ctx.fillStyle = grad

ctx.beginPath()
ctx.arc(mouse.x,mouse.y,size,0,Math.PI*2)
ctx.fill()

}


// animation
function animate(){

time += 0.01

ctx.fillStyle="rgba(0,0,0,0.15)"
ctx.fillRect(0,0,canvas.width,canvas.height)

drawClimate()
drawHeatWaves()
updateParticles()
drawCursor()

requestAnimationFrame(animate)

}

animate()

window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight
createParticles()

})

</script>

</body>
</html>

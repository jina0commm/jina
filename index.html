<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Field</title>

<style>
body{
margin:0;
overflow:hidden;
background:#05070a;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let time = 0
let co2 = 420

let mouse = {
x:canvas.width/2,
y:canvas.height/2,
active:false
}


// fetch CO2 data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){}

}

getClimate()
setInterval(getClimate,600000)


// fluid nodes
let nodes=[]

for(let i=0;i<8;i++){

nodes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.4,
vy:(Math.random()-0.5)*0.4,
size:220+Math.random()*120

})

}


// cursor tracking
window.addEventListener("mousemove",(e)=>{

mouse.x = e.clientX
mouse.y = e.clientY
mouse.active = true

})


// climate color system
function getHeatColor(){

let heat = (co2 - 350) / 120
if(heat<0)heat=0
if(heat>1)heat=1

let r = 180 + heat*75
let g = 50 + heat*40

return `rgba(${r},${g},30,0.7)`

}


function drawFluid(){

nodes.forEach(n=>{

// gentle drift
n.vx += Math.sin(time*0.3 + n.y*0.01)*0.03
n.vy += Math.cos(time*0.3 + n.x*0.01)*0.03

n.x += n.vx
n.y += n.vy


// cursor interaction
let dx = mouse.x - n.x
let dy = mouse.y - n.y

let dist = Math.sqrt(dx*dx+dy*dy)

if(dist < 250){

let f = (250-dist)/250

n.x -= dx*f*0.06
n.y -= dy*f*0.06

}


// wrap edges
if(n.x<0)n.x=canvas.width
if(n.x>canvas.width)n.x=0
if(n.y<0)n.y=canvas.height
if(n.y>canvas.height)n.y=0


// gradient blob
let g = ctx.createRadialGradient(
n.x,n.y,0,
n.x,n.y,n.size
)

g.addColorStop(0,getHeatColor())
g.addColorStop(1,"rgba(0,120,255,0)")

ctx.fillStyle=g

ctx.beginPath()
ctx.arc(n.x,n.y,n.size,0,Math.PI*2)
ctx.fill()

})

}


// cooling cursor
function drawCursor(){

if(!mouse.active) return

let g = ctx.createRadialGradient(
mouse.x,mouse.y,0,
mouse.x,mouse.y,180
)

g.addColorStop(0,"rgba(80,200,255,0.7)")
g.addColorStop(1,"rgba(0,0,0,0)")

ctx.fillStyle=g

ctx.beginPath()
ctx.arc(mouse.x,mouse.y,180,0,Math.PI*2)
ctx.fill()

}


// background atmosphere
function drawBackground(){

let g = ctx.createLinearGradient(
0,0,
0,canvas.height
)

g.addColorStop(0,"#08121c")
g.addColorStop(1,"#020409")

ctx.fillStyle=g
ctx.fillRect(0,0,canvas.width,canvas.height)

}


// animation
function animate(){

time += 0.01

drawBackground()
drawFluid()
drawCursor()

requestAnimationFrame(animate)

}

animate()


window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight

})

</script>

</body>
</html>

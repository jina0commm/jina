<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Climate Field</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let co2 = 420
let cooling = 0
let time = 0

// fetch CO2 data
async function getClimate(){

try{

let res = await fetch("https://global-warming.org/api/co2-api")
let data = await res.json()

co2 = parseFloat(data.co2[data.co2.length-1].trend)

}catch(e){

console.log("climate fetch error")

}

}

getClimate()
setInterval(getClimate,600000)


// particles = atmosphere
let particles=[]

function createParticles(){

particles=[]

let count = Math.floor(co2/2)

for(let i=0;i<count;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1,
size:Math.random()*3+1

})

}

}

createParticles()

// visitor interaction
window.addEventListener("mousemove",()=>{

cooling = 0.5

})

// draw
function draw(){

time += 0.01

ctx.fillStyle="rgba(0,0,0,0.08)"
ctx.fillRect(0,0,canvas.width,canvas.height)

let heat = (co2/500) - cooling

if(heat<0) heat=0

let r = Math.floor(255*heat)
let g = Math.floor(120*(1-heat))
let b = Math.floor(255*(1-heat))

let gradient = ctx.createRadialGradient(

canvas.width/2,
canvas.height/2,
100,

canvas.width/2,
canvas.height/2,
canvas.width

)

gradient.addColorStop(0,`rgb(${r},${g},0)`)
gradient.addColorStop(1,`rgb(0,0,${b})`)

ctx.fillStyle=gradient
ctx.fillRect(0,0,canvas.width,canvas.height)

// turbulence
particles.forEach(p=>{

p.x += p.vx + Math.sin(time+p.y*0.01)*0.3
p.y += p.vy + Math.cos(time+p.x*0.01)*0.3

if(p.x<0) p.x=canvas.width
if(p.x>canvas.width) p.x=0
if(p.y<0) p.y=canvas.height
if(p.y>canvas.height) p.y=0

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(255,255,255,0.6)"
ctx.fill()

})

cooling *= 0.98

requestAnimationFrame(draw)

}

draw()

window.addEventListener("resize",()=>{

canvas.width = window.innerWidth
canvas.height = window.innerHeight
createParticles()

})

</script>

</body>
</html>
